# GitHub Actions workflow to build IDE Viewer
#
# Builds:
#   - Windows AMD64 (.exe installer)
#   - Windows ARM64 (.exe installer)
#   - Linux AMD64 (.deb package)
#   - Linux ARM64 (.deb package)
#   - macOS ARM64 (.pkg installer)
#   - Portal Docker image (multi-arch)
#

name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  APP_VERSION: '0.1.0'
  PYTHON_VERSION: '3.10'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-portal

jobs:
  # ===========================================
  # Windows AMD64
  # ===========================================
  windows-amd64:
    runs-on: windows-latest
    name: Windows AMD64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: x64
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller pywin32
      
      - name: Build executable
        run: pyinstaller --clean --noconfirm ideviewer.spec
      
      - name: Install Inno Setup
        run: choco install innosetup -y
      
      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" build_scripts\windows_installer.iss
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64-installer
          path: dist/IDEViewer-Setup-*.exe

  # ===========================================
  # Windows ARM64
  # ===========================================
  windows-arm64:
    runs-on: windows-latest
    name: Windows ARM64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller pywin32
      
      - name: Build executable
        run: pyinstaller --clean --noconfirm ideviewer.spec
      
      - name: Install Inno Setup
        run: choco install innosetup -y
      
      - name: Build ARM64 installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" build_scripts\windows_installer_arm64.iss
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64-installer
          path: dist/IDEViewer-Setup-*-arm64.exe

  # ===========================================
  # Linux AMD64
  # ===========================================
  linux-amd64:
    runs-on: ubuntu-latest
    name: Linux AMD64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build .deb package
        run: |
          mkdir -p dist
          docker buildx build \
            --platform linux/amd64 \
            -f build_scripts/Dockerfile.linux \
            -t ideviewer-builder-amd64 \
            --load \
            .
          docker run --rm -v $(pwd)/dist:/output ideviewer-builder-amd64
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-installer
          path: dist/ideviewer_*_amd64.deb

  # ===========================================
  # Linux ARM64
  # ===========================================
  linux-arm64:
    runs-on: ubuntu-latest
    name: Linux ARM64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build .deb package
        run: |
          mkdir -p dist
          docker buildx build \
            --platform linux/arm64 \
            -f build_scripts/Dockerfile.linux \
            -t ideviewer-builder-arm64 \
            --load \
            .
          docker run --rm -v $(pwd)/dist:/output ideviewer-builder-arm64
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-installer
          path: dist/ideviewer_*_arm64.deb

  # ===========================================
  # macOS ARM64
  # ===========================================
  macos-arm64:
    runs-on: macos-14  # M1 runner (ARM64)
    name: macOS ARM64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller
      
      - name: Build executable
        run: pyinstaller --clean --noconfirm ideviewer.spec
      
      - name: Build .pkg installer
        run: |
          chmod +x build_scripts/build_macos.sh
          ./build_scripts/build_macos.sh
      
      - name: Rename with architecture
        run: |
          mv dist/IDEViewer-*.pkg dist/IDEViewer-${{ env.APP_VERSION }}-arm64.pkg || true
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-installer
          path: dist/IDEViewer-*.pkg

  # ===========================================
  # Portal Docker Image (Multi-arch)
  # ===========================================
  portal-container:
    runs-on: ubuntu-latest
    name: Portal Container
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./portal
          file: ./portal/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================
  # Create Release (on tags)
  # ===========================================
  release:
    needs: [windows-amd64, windows-arm64, linux-amd64, linux-arm64, macos-arm64, portal-container]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: List artifacts
        run: find artifacts -type f -ls
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.pkg
          draft: true
          generate_release_notes: true
          body: |
            ## Portal Container
            
            Pull the portal container:
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```